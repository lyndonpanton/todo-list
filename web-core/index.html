<!DOCTYPE HTML>
<html lang="en-GB">
<head>
    <meta charset="UTF-8" />
    <meta name="author" content="Lyndon Mykal Panton" />
    <meta name="description" content="A web for creating todo lists which can
        have items added, crossed, edited, and deleted" />
    <meta name="keywords" content="Todo, Todo list, Notes, Planning, Management,
        Todos"/>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="./css/styles.css" />
    <script src="https://kit.fontawesome.com/3556eab2e4.js" crossorigin="anonymous"></script>
    <script src="./js/script.js"></script>
</head>
<body>
    <header id="header-primary" class="section-primary">
        <nav id="nav-primary">
            <ul id="nav-primary-list">
                <li class="nav-primary-list-item">Home</li>
                <li class="nav-primary-list-item">Projects</li>
                <li class="nav-primary-list-item">About Me</li>
            </ul>
        </nav>

        <h1>Todo List</h1>
    </header>

    <main id="main-primary" class="section-primary">
        <!-- TODO: Replace sections with fieldsets in all application
            versions -->
        <article>
            <h2>My Todo List</h2>

            <ul id="todo-list">
                <!-- TODO: Use JavaScript -->
                <li class="todo-list-item">
                    <input
                        class="todo-list-checkbox"
                        type="checkbox"
                    />
                    Buy groceries
                    <i class="fa-solid fa-xmark todo-list-cross"></i>
                </li>
                <li class="todo-list-item">
                    <input
                        class="todo-list-checkbox"
                        type="checkbox"
                    />
                    Feed cat
                    <i class="fa-solid fa-xmark todo-list-cross"></i>
                </li>
                <li class="todo-list-item">
                    <input
                        class="todo-list-checkbox"
                        type="checkbox"
                    />
                    Email bob
                    <i class="fa-solid fa-xmark todo-list-cross"></i>
                </li>
            </ul>
            <form id="todo-form">
                <!-- TODO: Use JavaScript to prevent default -->
                <section id="todo-input">
                    <!-- TODO: Add label in all application versions -->
                    <input
                        id="todo-add-input"
                        name="todo-add-input"
                        type="text"
                        placeholder="New list item" />
<!--                        onChange=""-->
                    <!-- Use JavaScript for submission event -->
                    <button id="todo-add-button">Add</button>
                </section>
                <section>
                    <!-- Use JavaScript to clear list -->
                    <button id="clear-todo-list-button">Clear List</button>
                </section>
            </form>

        </article>
    </main>

    <footer id="footer-primary" class="section-primary">
        <p>&copy; 2024 Lyndon Mykal Panton – All Rights Reserved</p>
    </footer>
</body>
</html>>
